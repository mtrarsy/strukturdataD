
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .container { padding: 1rem 0; font-family: var(--font-mono, monospace); }
  .header { font-family: var(--font-sans); margin-bottom: 1rem; }
  .header h2 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; align-items: center; }
  .btn { font-family: var(--font-sans); font-size: 13px; padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background .15s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .btn-add { background: var(--color-background-success); color: var(--color-text-success); border-color: var(--color-border-success); }
  .btn-reset { background: var(--color-background-warning); color: var(--color-text-warning); border-color: var(--color-border-warning); }
  .result-panel { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; margin-bottom: 1rem; font-size: 13px; min-height: 52px; }
  .result-label { color: var(--color-text-secondary); font-family: var(--font-sans); font-size: 12px; margin-bottom: 4px; }
  .result-seq { color: var(--color-text-primary); letter-spacing: 1px; font-size: 14px; font-weight: 500; }
  .result-seq span.hl { display: inline-block; background: #EF9F27; color: #412402; border-radius: 4px; padding: 0 5px; margin: 1px; transition: all .2s; }
  svg#tree { display: block; width: 100%; overflow: visible; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 12px; color: var(--color-text-secondary); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .input-row { display: flex; gap: 8px; align-items: center; }
  input[type=number] { width: 80px; }
</style>

<div class="container">
  <div class="header">
    <h2>Binary Search Tree — Visualisasi Interaktif</h2>
    <p>Klik node untuk info · Pilih traversal untuk animasi urutan kunjungan</p>
  </div>

  <div class="controls">
    <button class="btn" id="btn-pre" onclick="runTraversal('preorder')">▶ Preorder</button>
    <button class="btn" id="btn-in"  onclick="runTraversal('inorder')">▶ Inorder</button>
    <button class="btn" id="btn-post" onclick="runTraversal('postorder')">▶ Postorder</button>
    <div class="input-row">
      <input type="number" id="new-val" placeholder="nilai" min="1" max="999" style="width:80px">
      <button class="btn btn-add" onclick="addNode()">+ Tambah Node</button>
    </div>
    <button class="btn btn-reset" onclick="resetTree()">↺ Reset</button>
  </div>

  <div class="result-panel">
    <div class="result-label" id="trav-label">Pilih traversal untuk melihat urutan kunjungan node</div>
    <div class="result-seq" id="trav-seq"></div>
  </div>

  <svg id="tree" viewBox="0 0 660 380"></svg>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div><span>Node awal (50,30,70,20,40,60,80)</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div><span>Node baru (10,90,65)</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div><span>Sedang dikunjungi</span></div>
  </div>
</div>

<script>
const INITIAL = [50,30,70,20,40,60,80];
const ADDED   = [10,90,65];

class BSTNode { constructor(v){ this.v=v; this.l=null; this.r=null; } }
class BSTClass {
  constructor(){ this.root=null; }
  insert(r,v){ if(!r)return new BSTNode(v); if(v<r.v)r.l=this.insert(r.l,v); else r.r=this.insert(r.r,v); return r; }
  preorder(r,a=[]){ if(r){a.push(r.v);this.preorder(r.l,a);this.preorder(r.r,a);} return a; }
  inorder(r,a=[]){ if(r){this.inorder(r.l,a);a.push(r.v);this.inorder(r.r,a);} return a; }
  postorder(r,a=[]){ if(r){this.postorder(r.l,a);this.postorder(r.r,a);a.push(r.v);} return a; }
}

let bst = new BSTClass();
let addedSet = new Set(ADDED);
let currentAnim = null;

function resetTree(){
  bst = new BSTClass();
  addedSet = new Set(ADDED);
  INITIAL.forEach(v => bst.root = bst.insert(bst.root, v));
  ADDED.forEach(v => bst.root = bst.insert(bst.root, v));
  document.getElementById('trav-label').textContent = 'Pilih traversal untuk melihat urutan kunjungan node';
  document.getElementById('trav-seq').innerHTML = '';
  ['btn-pre','btn-in','btn-post'].forEach(id => document.getElementById(id).classList.remove('active'));
  if(currentAnim) clearTimeout(currentAnim);
  renderTree();
}

function addNode(){
  const inp = document.getElementById('new-val');
  const v = parseInt(inp.value);
  if(isNaN(v)) return;
  addedSet.add(v);
  bst.root = bst.insert(bst.root, v);
  inp.value = '';
  renderTree();
}

function layout(node, depth=0, lo=0, hi=1, pos={}){
  if(!node) return pos;
  const mid = (lo+hi)/2;
  pos[node.v] = {x: mid, y: depth};
  layout(node.l, depth+1, lo, mid, pos);
  layout(node.r, depth+1, mid, hi, pos);
  return pos;
}

function getAllNodes(r, arr=[]){ if(r){arr.push(r);getAllNodes(r.l,arr);getAllNodes(r.r,arr);} return arr; }
function getAllEdges(r, arr=[]){ if(r){if(r.l)arr.push([r.v,r.l.v]);if(r.r)arr.push([r.v,r.r.v]);getAllEdges(r.l,arr);getAllEdges(r.r,arr);} return arr; }

function renderTree(highlighted=new Set()){
  const svg = document.getElementById('tree');
  svg.innerHTML = '';
  if(!bst.root) return;

  const pos = layout(bst.root);
  const nodes = getAllNodes(bst.root);
  const edges = getAllEdges(bst.root);

  const PAD=40, W=660-PAD*2, ROWH=72;
  const maxDepth = Math.max(...nodes.map(n=>pos[n.v].y));
  const H = (maxDepth+1)*ROWH + 60;
  svg.setAttribute('viewBox', `0 0 660 ${H}`);

  function px(frac){ return PAD + frac*W; }
  function py(depth){ return 36 + depth*ROWH; }

  // draw edges
  for(const [a,b] of edges){
    const la = document.createElementNS('http://www.w3.org/2000/svg','line');
    la.setAttribute('x1', px(pos[a].x));
    la.setAttribute('y1', py(pos[a].y));
    la.setAttribute('x2', px(pos[b].x));
    la.setAttribute('y2', py(pos[b].y));
    la.setAttribute('stroke','var(--color-border-secondary)');
    la.setAttribute('stroke-width','1.5');
    svg.appendChild(la);
  }

  // draw nodes
  for(const nd of nodes){
    const cx = px(pos[nd.v].x);
    const cy = py(pos[nd.v].y);
    const isHL = highlighted.has(nd.v);
    const isAdded = addedSet.has(nd.v);

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';
    g.onclick = () => showNodeInfo(nd.v, cx, cy);

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', 22);
    circle.setAttribute('stroke-width','1.5');

    if(isHL){
      circle.setAttribute('fill','#EF9F27');
      circle.setAttribute('stroke','#BA7517');
    } else if(isAdded){
      circle.setAttribute('fill','#378ADD');
      circle.setAttribute('stroke','#185FA5');
    } else {
      circle.setAttribute('fill','#1D9E75');
      circle.setAttribute('stroke','#0F6E56');
    }

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','central');
    text.setAttribute('font-size','13');
    text.setAttribute('font-weight','500');
    text.setAttribute('fill','white');
    text.setAttribute('font-family','var(--font-mono, monospace)');
    text.textContent = nd.v;

    g.appendChild(circle);
    g.appendChild(text);
    svg.appendChild(g);
  }
}

function showNodeInfo(v, cx, cy){
  const n = findNode(bst.root, v);
  const info = `Node: ${v} | Kiri: ${n.l?n.l.v:'—'} | Kanan: ${n.r?n.r.v:'—'}`;
  document.getElementById('trav-label').textContent = info;
}
function findNode(r, v){ if(!r)return null; if(r.v===v)return r; if(v<r.v)return findNode(r.l,v); return findNode(r.r,v); }

function runTraversal(type){
  if(currentAnim) clearTimeout(currentAnim);
  ['btn-pre','btn-in','btn-post'].forEach(id => document.getElementById(id).classList.remove('active'));
  const names = {preorder:'btn-pre', inorder:'btn-in', postorder:'btn-post'};
  document.getElementById(names[type]).classList.add('active');

  const labels = {preorder:'Preorder (Root → Left → Right)', inorder:'Inorder (Left → Root → Right)', postorder:'Postorder (Left → Right → Root)'};
  document.getElementById('trav-label').textContent = labels[type];

  const seq = bst[type](bst.root);
  const seqEl = document.getElementById('trav-seq');
  seqEl.innerHTML = seq.map(v=>`<span id="seq-${v}">${v}</span>`).join(' ');

  renderTree();
  let i=0;
  function step(){
    if(i>0){
      const prev = seq[i-1];
      const el = document.getElementById(`seq-${prev}`);
      if(el) el.classList.remove('hl');
    }
    if(i<seq.length){
      renderTree(new Set(seq.slice(0,i+1)));
      const cur = seq[i];
      const el = document.getElementById(`seq-${cur}`);
      if(el) el.classList.add('hl');
      i++;
      currentAnim = setTimeout(step, 600);
    }
  }
  step();
}

resetTree();
</script>
